  holdout_capacity: 2000
  test_steps: 5

  freeze_holdout_at: 0
  reset_holdout_on_drift: false
  drift_threshold: 0.0
  drift_sample_size: 128

  search_smolgen: false
  search_nla: false
  search_optimizer: false
  search_optimizer_choices: [cosmos_fast]

  pb2_bounds_w_soft: [0.35, 0.80]
  pb2_bounds_w_wdl: [0.70, 1.10]
