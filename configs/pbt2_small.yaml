# PBT2 (PB2) search config — small model, 10 parallel trials on RTX 5090 (32 GB)
#
# Run 8: Raise w_wdl/w_soft defaults to PBT-converged values; expand high bounds.
#   Run 7: PBT converged: w_wdl→0.95-0.98, w_soft→1.2 (ceiling). Gumbel values_out
#   bug fixed (search Q now returned instead of stale root Q), enabling real diff-focus.
#   New plateau: os≈278-280 (rmp≈0.27) vs old 222-224. Both weights hit upper bounds.
#
# What PB2 searches now:
#   lr, w_wdl, w_soft, w_sf_move, w_sf_wdl, diff_focus_q_weight
#
# What is pinned:
#   diff_focus_* (medians of top-5), temperature, playout_cap_fraction,
#   sf_policy_temp, sf_policy_label_smooth, feature_dropout_p, w_future, soft_policy_temp
#
# Data flow per iteration:
#   150 games × ~20-30 pos = ~3k-5k new samples → up to 15 training steps (256 batch)

seed: 0
work_dir: runs/pbt2_small
device: cuda
iterations: 750
replay_capacity: 5000000   # Hard cap
replay_window_start: 20000   # Small start so early easy games evict by iter 10-15
replay_window_max: 2000000
replay_window_growth: 2500   # ~17 iters in buffer; LC0/AlphaZero use large windows for stability

# Bootstrap: train initial net on all random games, then discard from window
bootstrap_dir: data/bootstrap
bootstrap_checkpoint: /home/josh/projects/chess/data/bootstrap/bootstrap_net_v5_iter239.pt  # os=334, reg=0.375
bootstrap_zero_policy_heads: true  # Bootstrap trained value/trunk only; start policy heads near-uniform on fresh runs.
worker_wheel_path: null  # Optional: built wheel to publish for remote worker self-update.
bootstrap_max_positions: 0   # 0 = load ALL positions (14.2M) — used by scripts/train_bootstrap.py
bootstrap_train_steps: 0     # 0 = auto: train 1 epoch — used by scripts/train_bootstrap.py
shared_shards_dir: null  # Disabled: start trials from bootstrap weights + fresh selfplay window
salvage_seed_pool_dir: /home/josh/projects/chess/data/salvage_iter37  # Iter 37: os=328, 66 shards
salvage_restore_donor_config: false   # Disabled: use GPBT-sampled LR (0.0003) not donor's 0.001
salvage_restore_full_trainer_state: true  # Full optimizer + scheduler + step state
salvage_restore_pid_state: true  # Copy PID controller state (regret, ema_winrate)
salvage_reinit_volatility_heads: false  # Keep volatility heads from trial 3

model:
  kind: transformer
  embed_dim: 384     # ~15M params, ~0.7 GB optimizer state for 4 trials in 32 GB VRAM
  num_layers: 9
  num_heads: 12
  ffn_mult: 1.5
  use_smolgen: true  # Pin to true (we know smolgen helps from spec)
  use_nla: false
  gradient_checkpointing: false

stockfish:
  stockfish_path: /home/josh/projects/chess/e2e_server/publish/stockfish
  sf_nodes: 5000           # 5k nodes: wider WDL spread so regret actually filters moves (was 1k where all 12 passed)
  sf_workers: 2
  sf_multipv: 12
  sf_hash_mb: 16           # Larger TT helps at higher node counts
  # Keep SF at full strength for labels and sample from MultiPV for easier played moves.

  sf_pid_enabled: true
  sf_pid_target_winrate: 0.60
  sf_pid_ema_alpha: 0.50      # EMA half-life ~1 iter — faster reaction with shorter iters
  sf_pid_deadzone: 0.05            # Tighten when pid_wr > 0.65; ease when pid_wr < 0.55.
  sf_pid_rate_limit: 0.10
  sf_pid_min_games_between_adjust: 200  # Higher than games_per_iter so only the forced iteration-boundary adjust fires.
  sf_pid_kp: 1.0
  sf_pid_ki: 0.10
  sf_pid_kd: 0.0
  sf_pid_integral_clamp: 1.0
  sf_pid_min_nodes: 5000         # 5k nodes: wider WDL spread so regret filter actually works
  sf_pid_max_nodes: 10000
  sf_pid_initial_skill_level: 20
  sf_pid_skill_min: 20
  sf_pid_skill_max: 20
  sf_pid_skill_promote_nodes: 2000
  sf_pid_skill_demote_nodes: 1000
  sf_pid_skill_nodes_on_promote: 1000
  sf_pid_skill_nodes_on_demote: 1000
  sf_pid_random_move_prob_start: 0.01   # Tiny fixed exploration (not PID-controlled)
  sf_pid_random_move_prob_min: 0.01    # Locked: rmp stage instantly complete
  sf_pid_random_move_prob_max: 0.01    # Locked
  sf_pid_random_move_stage_end: 0.01   # rmp stage instantly complete → PID jumps to regret
  sf_pid_max_rand_step: 0.01
  sf_pid_max_rand_step_start: 0.01
  sf_pid_max_rand_step_ramp_iters: 0
  sf_pid_topk_stage_end: 1.0
  sf_pid_topk_min: 12                  # Always full multipv — regret band is the sole difficulty lever
  sf_pid_suboptimal_wdl_regret_max: 2.0   # Allow very wide regret for bootstrap warmup
  sf_pid_suboptimal_wdl_regret_min: 0.01
  sf_pid_wdl_regret_start: 0.50       # Start near equilibrium for 5k nodes; model stable here
  sf_pid_wdl_regret_min: 0.02         # hard floor
  sf_pid_wdl_regret_max: 2.0          # max if PID needs to ease off
  sf_pid_wdl_regret_stage_end: 0.05   # nodes unlock when regret reaches 5%
  sf_pid_max_regret_step: 0.001       # Slow tightening — model crashes at 0.003
  sf_pid_max_regret_ease_step: 0.002  # 2x tighten (was 5x) — minimal asymmetry, less oscillation

selfplay:
  games_per_iter: 800
  games_per_iter_start: 32  # One round of 8 workers × 4 games; fast sanity check.
  games_per_iter_ramp_iters: 5
  selfplay_fraction: 0.50  # 50/50 selfplay vs curriculum for stronger WDL signal
  selfplay_batch: 256   # Concurrent game slots per worker (always full via continuous recycling).
  max_plies: 450

  temperature: 1.0       # Gumbel improved policy already provides exploration; T=1.0 avoids distorting the search target.
  temperature_drop_plies: 0
  temperature_after: 0.0
  temperature_decay_start_move: 20
  temperature_decay_moves: 60
  temperature_endgame: 0.6

  opening_book_path: /home/josh/projects/chess/data/opening_books/2moves_v2.pgn.zip
  opening_book_max_plies: 4
  opening_book_max_games: 200000
  opening_book_prob: 1.0
  opening_book_path_2: /home/josh/projects/chess/data/opening_books/8moves_v3.pgn.zip
  opening_book_max_plies_2: 16
  opening_book_max_games_2: 200000
  opening_book_mix_prob_2: 0.75  # 75% of book games use the 8-move book, 25% use the 2-move book
  random_start_plies: 2   # Fallback if book unavailable

  mcts: gumbel
  mcts_simulations: 256
  mcts_start_simulations: 256  # Full budget from start (KataGo-style: 75% full, 25% fast)
  playout_cap_fraction: 0.25  # 25% get full sims, 75% get fast
  fast_simulations: 32
  fpu_reduction: 1.2    # LC0/KataGo FPU for non-root nodes
  fpu_at_root: 1.0      # FPU for root (lower — root has Dirichlet noise)

  sf_policy_temp: 0.35       # Pinned: top-5 median from Run 4
  sf_policy_label_smooth: 0.10  # Pinned: top-5 median from Run 4
  soft_policy_temp: 3.0     # Temperature for soft policy target (LC0 uses 3, was hardcoded 2)

  syzygy_path: null
  syzygy_policy: false

  # Stockfish WDL confidence required to adjudicate max_plies timeouts as decisive.
  timeout_adjudication_threshold: 0.99

  diff_focus_enabled: true
  diff_focus_q_weight: 4.8   # Pinned: top-5 median from Run 4
  diff_focus_pol_scale: 3.8   # Pinned: top-5 median from Run 4
  diff_focus_slope: 4.0       # Pinned: top-5 median from Run 4
  diff_focus_min: 0.09        # Pinned: top-5 median from Run 4

  categorical_bins: 32
  hlgauss_sigma: 0.04

train:
  optimizer: adamw
  lr: 0.0003        # AdamW needs lower LR than cosmos_fast (which had lr_ratio=0.1).
  batch_size: 256   # Keep microbatch small enough for VRAM; use accumulation for the larger effective batch.
  train_steps: 800  # Raised for 2M buffer; window_fraction gives ~781 steps at full size.
  train_window_fraction: 0.10  # Train on 10% of replay buffer per iter (steps = replay * 0.10 / batch_size).
  # With ~10k new positions/iter and buffer growing by 2500/iter, each position
  # survives ~50 iters in the buffer and gets trained ~5 times before eviction.
  no_amp: false
  feature_dropout_p: 0.10  # Fixed at 0.10 (not searched).
  zclip_z_thresh: 2.5
  zclip_alpha: 0.97
  zclip_max_norm: 5.0  # was 1.0; raised because raw grad norms median ~2.2 meant every step was hard-clipped, dampening effective LR by ~55%. Z-score clipping still handles outliers.

  w_policy: 1.0             # Pinned: anchor for all other weights
  w_soft: 1.2               # PBT converged to ceiling (1.2) every trial in Run 7; set as default.
  w_future: 0.01            # Keep a tiny auxiliary weight; low-risk compared with full disable.
  w_wdl: 0.95               # Pinned near best trial from run30.
  w_sf_move: 0.01           # Keep a tiny auxiliary weight; PB2 no longer searches this head.
  w_sf_eval: 0.10           # Pinned: top-5 median from Run 4
  w_categorical: 0.30       # Run 26 default.
  w_volatility: 0.10        # Pinned: top-5 median from Run 4
  w_sf_volatility: 0.05
  w_moves_left: 0.02
  w_sf_wdl: 1.7             # SF WDL weight at wide regret (easy opponent); decays to floor as regret tightens.
  sf_wdl_conf_power: 1.0    # Confidence damping: scale SF-WDL by (1-draw_prob)^power.
  sf_wdl_draw_scale: 0.55   # Pinned low-to-mid based on the healthier late-run settings.
  sf_wdl_floor: 0.20        # Floor: keep 20% SF signal even at tight regret.
  sf_wdl_floor_at_regret: 0.10  # Regret value at which SF WDL weight hits the floor.

  accum_steps: 1    # More gradient steps per iteration; effective batch = 256.
  warmup_steps: 72   # Run 26 default.
  lr_eta_min: 0.00001
  lr_T0: 999999        # Disable cosine cycling — PBT exploit/explore handles LR variation
  lr_T_mult: 1
  use_compile: false
  swa_start: -1  # Disabled: SWA averaging hurts early training. Enable after model stabilizes.
  swa_freq: 50

puzzle_epd: null
puzzle_interval: 0     # Disabled — too slow for many parallel trials

tune:
  min_replay_size: 0  # Tune path trains when replay >= batch_size; keep 0 for no extra floor

  # Disk usage controls
  # NOTE: PB2/PBT needs older checkpoints to be available for cloning/exploit.
  # Keeping too few checkpoints can cause missing-checkpoint restore errors.
  tune_num_to_keep: 3               # keep last 3 checkpoints per trial (disk space)
  tune_keep_last_experiments: 2     # keep last 2 experiments under work_dir/tune

  tune_scheduler: gpbt_pl
  gpbt_inertia_weight: 1.0
  gpbt_winner_weight: 1.0
  gpbt_quantile_fraction: 0.25
  gpbt_resample_probability: 0.20
  num_samples: 1
  max_concurrent_trials: 1
  cpus_per_trial: 1
  gpus_per_trial: 1.0
  distributed_workers_per_trial: 2  # 2 compiled workers × 1 thread; proven ~170s/iter
  distributed_worker_sf_workers: 8  # 8 SF per worker = 16 total
  distributed_worker_min_games_per_batch: 128  # GPU needs large batches for utilization
  distributed_worker_max_games_per_batch: 512
  distributed_worker_username: josh
  distributed_worker_password: chess_worker_2026
  distributed_worker_use_compile: true
  distributed_worker_compile_mode: max-autotune
  distributed_worker_inference_fp8: false  # FP8 quantized inference (RTX 5090 native)
  distributed_worker_threaded: false  # Compiled 2w×1t: proven ~170s/iter, AOT threading slower in prod
  distributed_worker_selfplay_threads: 1
  # distributed_worker_aot_dir: data/aot_models  # Auto-detected by _worker_inference_args when threaded=true
  distributed_inference_broker_enabled: false
  distributed_inference_shared_broker: true
  distributed_inference_batch_wait_ms: 5.0
  distributed_inference_max_batch_per_slot: 2048
  distributed_inference_use_compile: true
  distributed_pause_selfplay_during_training: false  # Compile done; overlap for speed
  distributed_worker_shared_cache_dir: /home/josh/projects/chess/runs/pbt2_small/server/worker_cache
  distributed_min_workers_per_trial: 1
  distributed_max_worker_delta_per_rebalance: 1
  distributed_wait_timeout_seconds: 400  # ~1.5 batch cycles; don't wait forever for stale workers
  distributed_prev_model_max_fraction: 0.50  # Accept more prev-model games to reduce wait
  distributed_min_games_fraction: 0.40  # Allow timeout at 40% target if games are slow
  distributed_server_port: 45453
  distributed_server_host: 0.0.0.0
  distributed_server_public_url: http://192.168.1.212:45453
  distributed_server_root_override: /home/josh/projects/chess/runs/pbt2_small/server
  tune_replay_root_override: /home/josh/projects/chess/runs/pbt2_small/replay

  # Disk-backed replay buffer: keeps ~1 GB per trial instead of ~10 GB
  shuffle_buffer_size: 25000  # In-memory shuffle buffer (run26 value)
  shuffle_refresh_interval: 1
  shuffle_refresh_shards: 5
  shard_size: 2000            # Samples per on-disk shard (~1 MB compressed)
  # On PB2 exploit (cross-trial restore), replace most recent local bad data and
  # import only latest-generation shards from strong sibling trials.
  exploit_replay_refresh_enabled: true   # Flush old data + copy donor data on exploit
  exploit_replay_skip_newest: 0
  exploit_replay_donor_shards: -1          # -1 = copy ALL donor shards; 0 = disabled; N = last N shards
  exploit_replay_share_top_enabled: true
  exploit_replay_top_k_trials: 3
  exploit_replay_top_within_best_frac: 0.05
  exploit_replay_top_min_metric: 0.0
  exploit_replay_max_unseen_iters_per_source: 1
  exploit_replay_share_fraction: 0.5
  exploit_replay_local_keep_recent_fraction: 0.0   # Flush ALL old data on exploit
  exploit_replay_local_keep_older_fraction: 0.0    # Flush ALL old data on exploit

  # PB2: exploit+explore every X iterations (was 20).
  pb2_perturbation_interval: 8

  tune_metric: opponent_strength_ema
  tune_mode: max

  # Net gating: DISABLED — gate was using 1-sim (raw policy) while selfplay
  # uses 64-sim MCTS, causing systematic rejection of every training step.
  # The model was frozen at iter 2-3 weights with no learning happening.
  # TODO: re-enable once gate uses same sim count as selfplay, or compare
  # new model vs old model instead of new model vs Stockfish.
  gate_games: 0           # 0 = disabled
  gate_threshold: 0.50
  gate_interval: 1
  gate_mcts_sims: 1

  # For eval: run fixed-strength eval games to get a cleaner metric than train_loss.
  # Disabled by default to keep the small-model run fast.
  eval_games: 0
  eval_sf_nodes: 500
  eval_mcts_simulations: 32

  holdout_fraction: 0.02
  holdout_capacity: 2000
  test_steps: 5

  freeze_holdout_at: 0
  reset_holdout_on_drift: false
  drift_threshold: 0.0
  drift_sample_size: 128

  # Binary dimensions: keep pinned during small-model search.
  search_smolgen: false
  search_nla: false
  search_optimizer: false
  search_optimizer_choices: [cosmos_fast]

  # Expanded PB2 search: opponent_strength stagnated at ~18.7 for 80+ iters
  # with only lr + w_wdl searched. Open up more dimensions to break plateau.
  #
  # Only pb2_bounds_* keys present here are searched; everything else is pinned.
  pb2_bounds_lr: [0.0003, 0.0003]  # Pinned at 0.0003 for AdamW
