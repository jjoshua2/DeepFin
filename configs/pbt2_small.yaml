# PBT2 (PB2) search config — small model, 10 parallel trials on RTX 5090 (32 GB)
#
# Run 7: Narrowed bounds + PB2 checkpoint fix
#   Run 6: Only 1/10 trials learned (Trial 00005). Root causes of others failing:
#     - w_sf_move > 0.1 and/or lr > 0.0018 caused value head death spiral
#     - PB2 couldn't clone checkpoints (all trials shared work_dir for ckpt saves)
#   Trial 00005 winning config: lr=0.0016, w_soft=0.89, w_future=0.26, w_sf_move=0.01
#   Fix: trainable uses trial_dir for per-trial state, bounds narrowed around winner
#
# What PB2 searches (5 params — narrowed):
#   lr [8e-4, 2.5e-3], w_soft [0.5, 1.0], w_future [0.0, 0.3],
#   w_sf_move [0.0, 0.05], soft_policy_temp [2.0, 4.0]
#
# What is pinned:
#   diff_focus_* (medians of top-5), temperature, playout_cap_fraction,
#   sf_policy_temp, sf_policy_label_smooth, feature_dropout_p, w_sf_wdl=0
#
# Data flow per iteration:
#   1000 games × ~100 pos = ~100k new positions → up to 100 training steps (256 batch)

seed: 0
work_dir: runs/pbt2_small
device: cuda
iterations: 750
replay_capacity: 1000000   # Max window size (grows from 100k to here)
replay_window_start: 100000  # Initial window size after bootstrap
replay_window_max: 1000000   # Grow to this over time
replay_window_growth: 1000   # Grow window by 1k/iter (with ~10k new positions, 90% of oldest data ages off)

# Bootstrap: train initial net on all random games, then discard from window
bootstrap_dir: data/bootstrap
bootstrap_checkpoint: /home/josh/projects/chess/data/bootstrap/bootstrap_net.pt  # Pre-trained (run scripts/train_bootstrap.py once)
bootstrap_max_positions: 0   # 0 = load ALL positions (14.2M) — used by scripts/train_bootstrap.py
bootstrap_train_steps: 0     # 0 = auto: train 1 epoch — used by scripts/train_bootstrap.py
shared_shards_dir: /home/josh/projects/chess/data/iter0_shared  # Pre-generated iter-0 selfplay (run scripts/generate_iter0.py once)

model:
  kind: transformer
  embed_dim: 128     # Small enough for 10 trials in 32 GB VRAM
  num_layers: 4
  num_heads: 4
  ffn_mult: 2
  use_smolgen: true  # Pin to true (we know smolgen helps from spec)
  use_nla: false
  gradient_checkpointing: false

stockfish:
  path: /home/josh/projects/chess/e2e_server/publish/stockfish
  nodes: 1000           # Higher nodes for better SF analysis quality (was 250)
  workers: 1
  multipv: 3
  # Note: skill_level is not passed to SF engine in tune path — SF always
  # runs at full strength (Skill Level 20). Difficulty is controlled entirely
  # by random_move_prob via PID.

  pid_enabled: true
  pid_target_winrate: 0.53
  pid_ema_alpha: 0.05
  pid_deadzone: 0.05
  pid_rate_limit: 0.10
  pid_min_games_between_adjust: 100  # Fire after 1 full iteration (100 games)
  pid_kp: 1.5
  pid_ki: 0.10
  pid_kd: 0.0
  pid_integral_clamp: 1.0
  pid_min_nodes: 1000        # Keep nodes fixed — difficulty via random_move_prob only
  pid_max_nodes: 1000
  pid_random_move_prob_start: 1.0
  pid_random_move_prob_min: 0.0
  pid_random_move_prob_max: 1.0
  pid_random_move_stage_end: 0.5
  pid_max_rand_step: 0.01

selfplay:
  games_per_iter: 1000  # ~100k positions per iter (1000 games × ~100 pos/game)
  selfplay_batch: 10    # Play games in mini-batches of 10 to keep memory low
  max_plies: 120

  temperature: 1.1       # Pinned: top-5 median from Run 4 (range 0.94-1.74)
  temperature_drop_plies: 0
  temperature_after: 0.0
  temperature_decay_start_move: 20
  temperature_decay_moves: 60
  temperature_endgame: 0.6

  opening_book_path: /home/josh/projects/chess/data/opening_books/2moves_v2.pgn.zip
  opening_book_max_plies: 4
  opening_book_max_games: 200000
  opening_book_prob: 1.0
  random_start_plies: 2   # Fallback if book unavailable

  mcts: puct
  mcts_simulations: 64
  mcts_start_simulations: 64  # Full budget from start (KataGo-style: 75% full, 25% fast)
  playout_cap_fraction: 0.30  # Pinned: top-5 median from Run 4
  fast_simulations: 8
  fpu_reduction: 1.2    # LC0/KataGo FPU for non-root nodes
  fpu_at_root: 1.0      # FPU for root (lower — root has Dirichlet noise)

  sf_policy_temp: 0.35       # Pinned: top-5 median from Run 4
  sf_policy_label_smooth: 0.10  # Pinned: top-5 median from Run 4
  soft_policy_temp: 3.0     # Temperature for soft policy target (LC0 uses 3, was hardcoded 2)

  syzygy_path: null
  syzygy_policy: false

  # Stockfish WDL confidence required to adjudicate max_plies timeouts as decisive.
  timeout_adjudication_threshold: 0.90

  diff_focus_enabled: true
  diff_focus_q_weight: 4.8   # Pinned: top-5 median from Run 4
  diff_focus_pol_scale: 3.8   # Pinned: top-5 median from Run 4
  diff_focus_slope: 4.0       # Pinned: top-5 median from Run 4
  diff_focus_min: 0.09        # Pinned: top-5 median from Run 4

  categorical_bins: 32
  hlgauss_sigma: 0.04

train:
  optimizer: nadamw
  lr: 0.0003        # Initial value; PB2 adapts this per-trial
  batch_size: 256   # Larger batch (requires more VRAM per trial)
  train_steps: 100  # Cap to prevent overfitting on iter-1's 99k shared load (386 uncapped).
                     # Normal iters: ~97 steps (uncapped). Samples from full sliding window.
  no_amp: false
  feature_dropout_p: 0.25  # Pinned: top-5 median from Run 4
  zclip_z_thresh: 2.5
  zclip_alpha: 0.97
  zclip_max_norm: 1.0

  w_policy: 1.0             # Pinned: anchor for all other weights
  w_soft: 0.5               # PB2 adapts this (initial 0.5)
  w_future: 0.1             # PB2 adapts this (initial 0.1)
  w_wdl: 1.0                # Pinned: main value head, always full weight
  w_sf_move: 0.1            # PB2 adapts this (initial 0.1)
  w_sf_eval: 0.10           # Pinned: top-5 median from Run 4
  w_categorical: 0.10       # Pinned: top-5 median from Run 4
  w_volatility: 0.10        # Pinned: top-5 median from Run 4
  w_sf_volatility: 0.05
  w_moves_left: 0.02
  w_sf_wdl: 0.0             # DISABLED: sf_wdl trains the MAIN WDL head (outputs["wdl"])
                             # with SF position evals that predict Loss for draw/win game
                             # positions (because bootstrap model plays weakly → SF correctly
                             # sees resulting positions as bad). This corrupts the value head
                             # MCTS uses (Q = W-L). The separate sf_eval head (w_sf_eval)
                             # already learns from SF evals without contaminating MCTS.
  sf_wdl_floor: 0.0         # Disabled along with w_sf_wdl
  sf_wdl_floor_at: 0.1

  accum_steps: 1
  warmup_steps: 400    # ~1 iter of bootstrap training
  lr_eta_min: 0.00001
  lr_T0: 680           # = pb2_perturbation_interval(8) * ~85 steps/iter; aligned with PB2
  lr_T_mult: 1         # constant cycle length; PB2 controls the peak each cycle
  use_compile: false
  swa_start: 0
  swa_freq: 50

puzzle_epd: null
puzzle_interval: 0     # Disabled — too slow for 10 parallel trials

tune:
  min_replay_size: 0  # Bootstrap data pre-fills buffer; train from iter 0

  # Disk usage controls
  # NOTE: PB2/PBT needs older checkpoints to be available for cloning/exploit.
  # Keeping too few checkpoints can cause missing-checkpoint restore errors.
  tune_num_to_keep: 10              # keep last 10 checkpoints per trial
  tune_keep_last_experiments: 2     # keep last 2 experiments under work_dir/tune

  tune_scheduler: pb2
  num_samples: 10
  max_concurrent_trials: 10   # All 10 trials run simultaneously (disk-backed buffer keeps RAM low)
  cpus_per_trial: 1
  gpus_per_trial: 0.1         # 10 × 0.1 = 1 GPU

  # Disk-backed replay buffer: keeps ~1 GB per trial instead of ~10 GB
  shuffle_buffer_size: 70000  # In-memory shuffle buffer (samples)
  shard_size: 2000            # Samples per on-disk shard (~1 MB compressed)

  # PB2: exploit+explore every X iterations (was 20).
  pb2_perturbation_interval: 8

  tune_metric: opponent_strength
  tune_mode: max

  # Net gating: DISABLED — gate was using 1-sim (raw policy) while selfplay
  # uses 64-sim MCTS, causing systematic rejection of every training step.
  # The model was frozen at iter 2-3 weights with no learning happening.
  # TODO: re-enable once gate uses same sim count as selfplay, or compare
  # new model vs old model instead of new model vs Stockfish.
  gate_games: 0           # 0 = disabled
  gate_threshold: 0.50
  gate_interval: 1
  gate_mcts_sims: 1

  # For eval: run fixed-strength eval games to get a cleaner metric than train_loss.
  # Disabled by default to keep the small-model run fast.
  eval_games: 0
  eval_sf_nodes: 500
  eval_mcts_simulations: 32

  holdout_fraction: 0.05
  holdout_capacity: 10000
  test_steps: 5

  freeze_holdout_at: 0
  reset_holdout_on_drift: false
  drift_threshold: 0.0
  drift_sample_size: 128

  # Binary dimensions: keep pinned during small-model search.
  search_smolgen: false
  search_nla: false
  search_optimizer: false

  # Run 7: Narrowed bounds from Run 6 + PB2 checkpoint fix.
  # Run 6 results: Only Trial 00005 learned (WR 57→73%, rmp 1.0→0.95).
  #   Config: lr=0.0016, w_soft=0.89, w_future=0.26, w_sf_move=0.01
  #   All declining trials had w_sf_move>0.1 and/or lr>0.0018.
  #   Key: high w_soft keeps policy gradient dominant, low w_sf_move avoids interference.
  #   Also: PB2 couldn't clone checkpoints because all trials wrote to shared work_dir.
  #   Fix: trainable now uses trial_dir (Ray-provided) for all per-trial state.
  #
  # Only pb2_bounds_* keys present here are searched; everything else is pinned.
  # 5 params — narrowed around Trial 00005's winning config + soft policy temp search.
  pb2_bounds_lr: [8e-4, 2.5e-3]         # Narrowed: 00005 was 0.0016, decliners had >0.0018
  pb2_bounds_w_soft: [0.5, 1.0]          # Narrowed: 00005 was 0.89, low w_soft trials declined
  pb2_bounds_w_future: [0.0, 0.3]        # Keep range: 00005 was 0.26 (high end)
  pb2_bounds_w_sf_move: [0.0, 0.05]      # Narrowed: 00005 was 0.01, >0.1 caused decline
  pb2_bounds_soft_policy_temp: [2.0, 4.0] # LC0 uses 3.0, was hardcoded at 2.0
