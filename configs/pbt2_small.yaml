# PBT2 (PB2) search config — small model, 10 parallel trials on RTX 5090 (32 GB)
#
# Run 7: Narrowed bounds + PB2 checkpoint fix
#   Run 6: Only 1/10 trials learned (Trial 00005). Root causes of others failing:
#     - w_sf_move > 0.1 and/or lr > 0.0018 caused value head death spiral
#     - PB2 couldn't clone checkpoints (all trials shared work_dir for ckpt saves)
#   Trial 00005 winning config: lr=0.0016, w_soft=0.89, w_future=0.26, w_sf_move=0.01
#   Fix: trainable uses trial_dir for per-trial state, bounds narrowed around winner
#
# What PB2 searches now (fresh 384d bootstrap run):
#   lr, w_wdl, w_sf_wdl
# We keep the search narrow until the new bootstrap proves stable.
#
# What is pinned:
#   diff_focus_* (medians of top-5), temperature, playout_cap_fraction,
#   sf_policy_temp, sf_policy_label_smooth, feature_dropout_p, w_future, soft_policy_temp
#
# Data flow per iteration:
#   150 games × ~20-30 pos = ~3k-5k new samples → up to 15 training steps (256 batch)

seed: 0
work_dir: runs/pbt2_small
device: cuda
iterations: 750
replay_capacity: 1000000   # Max window size (grows from 100k to here)
replay_window_start: 100000  # Initial window size after bootstrap
replay_window_max: 1000000   # Grow to this over time
replay_window_growth: 150   # Grow window by 150/iter

# Bootstrap: train initial net on all random games, then discard from window
bootstrap_dir: data/bootstrap
bootstrap_checkpoint: /home/josh/projects/chess/data/bootstrap/bootstrap_net.pt  # Pre-trained (run scripts/train_bootstrap.py once)
bootstrap_zero_policy_heads: true  # Bootstrap trained value/trunk only; start policy heads near-uniform on fresh runs.
bootstrap_max_positions: 0   # 0 = load ALL positions (14.2M) — used by scripts/train_bootstrap.py
bootstrap_train_steps: 0     # 0 = auto: train 1 epoch — used by scripts/train_bootstrap.py
shared_shards_dir: null  # Disabled: start trials from bootstrap weights + fresh selfplay window

model:
  kind: transformer
  embed_dim: 384     # 15M params, ~20 GB for 8 trials in 32 GB VRAM
  num_layers: 8
  num_heads: 12
  ffn_mult: 2
  use_smolgen: true  # Pin to true (we know smolgen helps from spec)
  use_nla: false
  gradient_checkpointing: false

stockfish:
  path: /home/josh/projects/chess/e2e_server/publish/stockfish
  nodes: 1000           # Higher nodes for better SF analysis quality (was 250)
  workers: 2
  multipv: 5
  hash_mb: 4            # Small TT is sufficient for low-node searches; saves RAM across trials.
  # Note: skill_level is not passed to SF engine in tune path — SF always
  # runs at full strength (Skill Level 20). Difficulty is controlled entirely
  # by random_move_prob via PID.

  pid_enabled: true
  pid_target_winrate: 0.53
  pid_ema_alpha: 0.20      # EMA half-life ~3.1 iterations; react faster while keeping per-step changes small.
  pid_deadzone: 0.025
  pid_rate_limit: 0.10
  pid_min_games_between_adjust: 150  # Fire after 1 full iteration (150 games)
  pid_kp: 1.5
  pid_ki: 0.10
  pid_kd: 0.0
  pid_integral_clamp: 1.0
  pid_min_nodes: 1000        # Keep nodes fixed — difficulty via random_move_prob only
  pid_max_nodes: 1000
  pid_random_move_prob_start: 0.995
  pid_random_move_prob_min: 0.0
  pid_random_move_prob_max: 1.0
  pid_random_move_stage_end: 0.5
  pid_max_rand_step: 0.005  # Cap difficulty changes at 0.5% per iteration to avoid early overshoots.

selfplay:
  games_per_iter: 150  # ~3k-5k samples per iter after filtering (150 games)
  selfplay_batch: 16    # Optimize throughput; lower trial count now provides the GPU headroom.
  max_plies: 120

  temperature: 1.1       # Pinned: top-5 median from Run 4 (range 0.94-1.74)
  temperature_drop_plies: 0
  temperature_after: 0.0
  temperature_decay_start_move: 20
  temperature_decay_moves: 60
  temperature_endgame: 0.6

  opening_book_path: /home/josh/projects/chess/data/opening_books/2moves_v2.pgn.zip
  opening_book_max_plies: 4
  opening_book_max_games: 200000
  opening_book_prob: 1.0
  random_start_plies: 2   # Fallback if book unavailable

  mcts: puct
  mcts_simulations: 64
  mcts_start_simulations: 64  # Full budget from start (KataGo-style: 75% full, 25% fast)
  playout_cap_fraction: 0.30  # Pinned: top-5 median from Run 4
  fast_simulations: 8
  fpu_reduction: 1.2    # LC0/KataGo FPU for non-root nodes
  fpu_at_root: 1.0      # FPU for root (lower — root has Dirichlet noise)

  sf_policy_temp: 0.35       # Pinned: top-5 median from Run 4
  sf_policy_label_smooth: 0.10  # Pinned: top-5 median from Run 4
  soft_policy_temp: 3.0     # Temperature for soft policy target (LC0 uses 3, was hardcoded 2)

  syzygy_path: null
  syzygy_policy: false

  # Stockfish WDL confidence required to adjudicate max_plies timeouts as decisive.
  timeout_adjudication_threshold: 0.90

  diff_focus_enabled: true
  diff_focus_q_weight: 4.8   # Pinned: top-5 median from Run 4
  diff_focus_pol_scale: 3.8   # Pinned: top-5 median from Run 4
  diff_focus_slope: 4.0       # Pinned: top-5 median from Run 4
  diff_focus_min: 0.09        # Pinned: top-5 median from Run 4

  categorical_bins: 32
  hlgauss_sigma: 0.04

train:
  optimizer: muon
  lr: 0.0012        # Seed near the healthier 3/6 384d fresh-trial lane; PB2 still adapts per-trial.
  batch_size: 256   # Keep microbatch small enough for VRAM; use accumulation for the larger effective batch.
  train_steps: 24  # Lower ceiling so early iterations do materially fewer optimizer updates.
  no_amp: false
  feature_dropout_p: 0.25  # Pinned: top-5 median from Run 4
  zclip_z_thresh: 2.5
  zclip_alpha: 0.97
  zclip_max_norm: 1.0

  w_policy: 1.0             # Pinned: anchor for all other weights
  w_soft: 0.73              # Pinned: no clear stable signal from searching this recently.
  w_future: 0.05            # Pinned during this run (not in pb2_bounds_*).
  w_wdl: 0.58               # Seed between the two fresh-winner clusters seen on 2026-03-06.
  w_sf_move: 0.03           # Pinned: earlier runs showed the high tail was harmful.
  w_sf_eval: 0.10           # Pinned: top-5 median from Run 4
  w_categorical: 0.10       # Pinned: top-5 median from Run 4
  w_volatility: 0.10        # Pinned: top-5 median from Run 4
  w_sf_volatility: 0.05
  w_moves_left: 0.02
  w_sf_wdl: 0.0             # Disable the SF-WDL auxiliary for this run; test whether it is poisoning the main WDL head.
  sf_wdl_conf_power: 1.0    # Confidence damping: scale SF-WDL by (1-draw_prob)^power.
  sf_wdl_draw_scale: 0.55   # Pinned low-to-mid based on the healthier late-run settings.
  sf_wdl_floor: 0.0         # Keep floor at 0 so PB2 can disable sf_wdl if harmful.
  sf_wdl_floor_at: 0.1

  accum_steps: 4    # Effective batch 1024 without the peak-memory cost of a literal 1024 microbatch.
  warmup_steps: 60    # ~1 iter of bootstrap training (with 15 train steps/iter)
  lr_eta_min: 0.00001
  lr_T0: 120           # aligned with shorter iterations (~15 steps/iter)
  lr_T_mult: 1         # constant cycle length; PB2 controls the peak each cycle
  use_compile: false
  swa_start: 0
  swa_freq: 50

puzzle_epd: null
puzzle_interval: 0     # Disabled — too slow for many parallel trials

tune:
  min_replay_size: 0  # Tune path trains when replay >= batch_size; keep 0 for no extra floor

  # Disk usage controls
  # NOTE: PB2/PBT needs older checkpoints to be available for cloning/exploit.
  # Keeping too few checkpoints can cause missing-checkpoint restore errors.
  tune_num_to_keep: 10              # keep last 10 checkpoints per trial
  tune_keep_last_experiments: 2     # keep last 2 experiments under work_dir/tune

  tune_scheduler: gpbt_pl
  gpbt_pairwise_lr: 0.35
  gpbt_pairwise_momentum: 0.50
  gpbt_quantile_fraction: 0.25
  gpbt_resample_probability: 0.05
  num_samples: 6
  max_concurrent_trials: 6    # Run a true 6-trial population to cut GPU pressure from trainers + CUDA workers.
  cpus_per_trial: 2
  gpus_per_trial: 0.1         # 8 × 0.1 = 0.8 GPU
  distributed_workers_per_trial: 4
  distributed_worker_sf_workers: 1

  # Disk-backed replay buffer: keeps ~1 GB per trial instead of ~10 GB
  shuffle_buffer_size: 70000  # In-memory shuffle buffer (samples)
  shard_size: 2000            # Samples per on-disk shard (~1 MB compressed)
  # On PB2 exploit (cross-trial restore), replace most recent local bad data and
  # import only latest-generation shards from strong sibling trials.
  exploit_replay_refresh_enabled: true
  exploit_replay_skip_newest: 0
  exploit_replay_share_top_enabled: false  # Disable for the fresh 384d run; salvage tests showed this amplifies instability.
  exploit_replay_top_k_trials: 3
  exploit_replay_top_within_best_frac: 0.05
  exploit_replay_top_min_metric: 0.0
  exploit_replay_max_unseen_iters_per_source: 1
  exploit_replay_local_keep_recent_fraction: 0.20
  exploit_replay_local_keep_older_fraction: 0.65

  # PB2: exploit+explore every X iterations (was 20).
  pb2_perturbation_interval: 4

  tune_metric: opponent_strength
  tune_mode: max

  # Net gating: DISABLED — gate was using 1-sim (raw policy) while selfplay
  # uses 64-sim MCTS, causing systematic rejection of every training step.
  # The model was frozen at iter 2-3 weights with no learning happening.
  # TODO: re-enable once gate uses same sim count as selfplay, or compare
  # new model vs old model instead of new model vs Stockfish.
  gate_games: 0           # 0 = disabled
  gate_threshold: 0.50
  gate_interval: 1
  gate_mcts_sims: 1

  # For eval: run fixed-strength eval games to get a cleaner metric than train_loss.
  # Disabled by default to keep the small-model run fast.
  eval_games: 0
  eval_sf_nodes: 500
  eval_mcts_simulations: 32

  holdout_fraction: 0.02
  holdout_capacity: 2000
  test_steps: 5

  freeze_holdout_at: 0
  reset_holdout_on_drift: false
  drift_threshold: 0.0
  drift_sample_size: 128

  # Binary dimensions: keep pinned during small-model search.
  search_smolgen: false
  search_nla: false
  search_optimizer: false

  # Fresh-bootstrap PB2 pass:
  # - Start from the new 384d bootstrap with no salvage state and no per-iteration cross-trial replay sharing.
  # - Search only optimizer/value-lane weights; pin policy-shaping weights until the run is stable.
  # - Disable the SF-WDL lane entirely to test whether it is destabilizing early learning.
  #
  # Only pb2_bounds_* keys present here are searched; everything else is pinned.
  pb2_bounds_lr: [1.0e-3, 1.6e-3]       # 2026-03-06 fresh 384d learners lived in roughly the 1.05e-3 to 1.59e-3 lane.
  pb2_bounds_w_wdl: [0.45, 0.65]        # Keep both fresh-winner clusters (~0.46 and ~0.62) without re-opening the high tail.
